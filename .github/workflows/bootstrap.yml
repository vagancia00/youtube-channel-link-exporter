name: Bootstrap repository

on:
  push:
    branches: [main]
    paths:
      - '.bootstrap/repository.zip.b64'
      - '.github/workflows/bootstrap.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Expand prepared repository
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .bootstrap/repository.zip.b64 > /tmp/repository.zip
          mkdir -p /tmp/repository
          unzip -q /tmp/repository.zip -d /tmp/repository
          rsync -a --delete --exclude='.git/' /tmp/repository/youtube-channel-link-exporter/ ./
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap.yml

      - name: Publish project files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: publish YouTube Channel Link Exporter skill'
          git push
